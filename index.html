<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBite | Digital Menu</title>
    <style>
        /* CSS STYLING */
        :root {
            --primary: #ff4757;
            --dark: #2f3542;
            --bg: #f1f2f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); }

        header {
            background: var(--dark);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .cart-icon { cursor: pointer; font-size: 1.2rem; background: #444; padding: 8px 15px; border-radius: 20px; }

        .filters { text-align: center; padding: 20px; }
        .filters button {
            padding: 8px 20px; margin: 5px; cursor: pointer;
            border: none; border-radius: 20px; background: white; transition: 0.3s;
        }
        .filters button:hover { background: var(--primary); color: white; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px; padding: 0 5% 40px;
        }

        .food-card {
            background: white; border-radius: 15px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
        }

        .food-card img { width: 100%; border-radius: 10px; height: 180px; object-fit: cover; }

        .food-card button {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%;
        }

        /* Sidebar Cart */
        .cart-sidebar {
            position: fixed; right: -400px; top: 0; width: 320px; height: 100%;
            background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            transition: 0.4s ease; padding: 20px; z-index: 200; overflow-y: auto;
        }
        .cart-sidebar.active { right: 0; }
        
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        
        .close-btn { background: none; border: none; font-size: 2rem; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <header>
        <h1>SmartBite</h1>
        <div class="cart-icon" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</div>
    </header>

    <div class="filters">
        <button onclick="renderMenu('all')">All Items</button>
        <button onclick="renderMenu('burger')">Burgers</button>
        <button onclick="renderMenu('pizza')">Pizza</button>
    </div>

    <div id="menu-grid" class="menu-grid"></div>

    <div id="cart-sidebar" class="cart-sidebar">
        <button class="close-btn" onclick="toggleCart()">&times;</button>
        <h2>Your Order</h2>
        <div id="cart-items"></div>
        <hr>
        <h3>Total: $<span id="total-price">0.00</span></h3>
        <button style="width: 100%; padding: 15px; background: #2ed573; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="alert('Order Placed!')">Checkout</button>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        const menuData = [
            { id: 1, name: "Cheeseburger", price: 9.99, category: "burger", img: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500" },
            { id: 2, name: "Margherita Pizza", price: 12.50, category: "pizza", img: "https://images.unsplash.com/photo-1574071318508-1cdbad80ad50?w=500" },
            { id: 3, name: "Bacon Burger", price: 11.99, category: "burger", img: "https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=500" },
            { id: 4, name: "Veggie Pizza", price: 14.00, category: "pizza", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" }
        ];

        let cart = [];

        function renderMenu(filter = 'all') {
            const grid = document.getElementById('menu-grid');
            const items = filter === 'all' ? menuData : menuData.filter(item => item.category === filter);
            
            grid.innerHTML = items.map(item => `
                <div class="food-card">
                    <img src="${item.img}" alt="${item.name}">
                    <h3>${item.name}</h3>
                    <p>$${item.price.toFixed(2)}</p>
                    <button onclick="addToCart(${item.id})">Add to Order</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = menuData.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <strong>$${item.price.toFixed(2)}</strong>
                    <button style="border:none; background:none; color:red; cursor:pointer;" onclick="removeFromCart(${index})">Remove</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = total.toFixed(2);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        // Initialize App
        renderMenu();
    </script>
</body>
</html>
